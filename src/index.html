<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PROPASS</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="propass-ui.bundle.css" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function (e) {
        try {
          var box = document.getElementById('__err');
          if (!box) {
            box = document.createElement('pre');
            box.id = '__err';
            box.style.cssText = 'position:fixed;left:0;right:0;bottom:0;max-height:40vh;overflow:auto;background:#111827;color:#fff;padding:12px;z-index:99999;white-space:pre-wrap;';
            document.body.appendChild(box);
          }
          box.textContent += '\n' + (e && (e.error && e.error.stack || e.message) || String(e));
        } catch (_) {}
      });

      window.addEventListener('unhandledrejection', function (e) {
        try {
          var box = document.getElementById('__err');
          if (!box) {
            box = document.createElement('pre');
            box.id = '__err';
            box.style.cssText = 'position:fixed;left:0;right:0;bottom:0;max-height:40vh;overflow:auto;background:#111827;color:#fff;padding:12px;z-index:99999;white-space:pre-wrap;';
            document.body.appendChild(box);
          }
          var r = e && e.reason;
          var msg = (r && (r.stack || r.message)) ? (r.stack || r.message) : String(r);
          box.textContent += '\n' + 'UNHANDLED_REJECTION: ' + msg;
        } catch (_) {}
      });

      (function () {
        try {
          if (!window.fetch) return;
          var _fetch = window.fetch.bind(window);
          window.fetch = function () {
            var args = arguments;
            var url = '';
            try { url = String(args && args[0] || ''); } catch (_) {}
            return _fetch.apply(null, args).catch(function (err) {
              try {
                var box = document.getElementById('__err');
                if (!box) {
                  box = document.createElement('pre');
                  box.id = '__err';
                  box.style.cssText = 'position:fixed;left:0;right:0;bottom:0;max-height:40vh;overflow:auto;background:#111827;color:#fff;padding:12px;z-index:99999;white-space:pre-wrap;';
                  document.body.appendChild(box);
                }
                var msg = (err && (err.stack || err.message)) ? (err.stack || err.message) : String(err);
                box.textContent += '\n' + 'FETCH_FAIL url=' + url + '\n' + msg;
                try { console.error('FETCH_FAIL url=' + url + ' ' + msg); } catch (_) {}
              } catch (_) {}
              throw err;
            });
          };
        } catch (_) {}
      })();
    </script>
    <script src="propass-ui.bundle.js"></script>
  </body>
</html>
